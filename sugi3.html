<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reason Menu Custom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: transparent !important; 
            display: flex;
            justify-content: flex-start; 
            align-items: flex-start;     
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 30px;               
        }

        .menu-box {
            width: 420px;
            background: rgba(13, 14, 18, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            /* Shadow adânc cu un glow subtil violet pe fundal */
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 
                        0 0 50px rgba(78, 5, 160, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;

            --macho-glow: rgba(78, 5, 160, 0.3);

            /* [ANIMATION] Animație modernă de deschidere direct pe element (fără clase secundare) */
            animation: machoOpen 0.35s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transform-origin: top left;
        }

        /* [ANIMATION KEYFRAMES] Intrare fluidă: apare din transparență, vine ușor de sus și se mărește fin */
        @keyframes machoOpen {
            from {
                opacity: 0;
                transform: translateY(-15px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .menu-banner {
            width: 100%;
            height: 110px;
            background-image: url('https://i.ytimg.com/vi/GokDEuoHwoo/sddefault.jpg'); 
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            
            /* [ANIMATION] Efect elegant de adâncime pe banner la pornire */
            animation: bannerReveal 0.6s ease-out;
            transform-origin: top;
        }
        
        @keyframes bannerReveal {
            from { transform: scaleY(1.2); opacity: 0; }
            to { transform: scaleY(1); opacity: 1; }
        }

        .categories-bar {
            display: flex;
            background: rgba(20, 21, 26, 0.98);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0;
            position: relative;
        }

        .category-tab {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.25s ease, background-color 0.25s ease;
            position: relative;
        }

        .category-tab.active {
            color: #ffffff; 
            background: rgba(78, 5, 160, 0.06);
            box-shadow: none; 
        }
        
        /* [ANIMATION] Indicator modern sub tab sub formă de linie glisantă */
        .category-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: #7289da;
            transition: width 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            transform: translateX(-50%);
            box-shadow: 0 0 10px #7289da;
        }
        
        .category-tab.active::after {
            width: 80%; 
        }

        .menu-content {
            padding: 22px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 340px; 
            overflow: hidden;
            background: rgba(13, 14, 18, 0.5);
        }

        .tab-panel {
            display: none;
            flex-direction: column;
            gap: 8px;
            /* [ANIMATION] Tranziție discretă la schimbarea categoriilor (Q/E) */
            animation: panelFade 0.25s ease-out;
        }
        
        @keyframes panelFade {
            from { opacity: 0; transform: translateX(8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .tab-panel.active {
            display: flex;
        }

        .menu-option {
            width: 100%;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px; 
            padding: 16px 20px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.3; 
            /* Tranziție rapidă de 0.15s ca tastele din Lua să răspundă instantaneu */
            transition: all 0.15s cubic-bezier(0.215, 0.61, 0.355, 1);
            position: relative;
        }

        /* [ANIMATION & ELEGANCE] Stilul modern FOCUSED când treci cu săgețile */
        .menu-option.focused {
            opacity: 1; 
            color: #ffffff;
            background: rgba(78, 5, 160, 0.15);
            border-color: rgba(114, 137, 218, 0.5); 
            font-weight: 600;
            box-shadow: 0 0 25px var(--macho-glow), 
                        inset 0 0 10px rgba(114, 137, 218, 0.1);
            transform: scale(1.015);
        }

        .menu-option .status-tag {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .menu-option.focused .status-tag {
            color: #7289da; 
            text-shadow: 0 0 8px rgba(114, 137, 218, 0.6);
        }
    </style>
</head>
<body>

    <div class="menu-box">
        <div class="menu-banner"></div>

        <div class="categories-bar">
            <div class="category-tab active">Self</div>
            <div class="category-tab">Weapons</div>
            <div class="category-tab">Visuals</div>
        </div>

        <div class="menu-content">
            <div id="panel-0" class="tab-panel active">
                <div class="menu-option focused"><span>Activare Godmode</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Reface Viață & Armură</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Teleport la Waypoint</span><span class="status-tag">[ENTER]</span></div>
            </div>

            <div id="panel-1" class="tab-panel">
                <div class="menu-option"><span>Oferă toate armele</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Muniție Infinită</span><span class="status-tag">[ENTER]</span></div>
            </div>

            <div id="panel-2" class="tab-panel">
                <div class="menu-option"><span>Pornește Wallhack (ESP)</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Bypass Screenshot</span><span class="status-tag">[ENTER]</span></div>
            </div>
        </div>
    </div>

    <script>
        const categories = Array.from(document.querySelectorAll('.category-tab'));

        // Logica ta originală de JS neatinsă, exact așa cum ai trimis-o!
        window.updateSelection = function(tabIdx, optionIdx) {
            // 1. Mută tab-ul activ (Q / E)
            categories.forEach((cat, idx) => {
                if (idx === tabIdx) {
                    cat.classList.add('active');
                    document.getElementById(`panel-${idx}`).classList.add('active');
                } else {
                    cat.classList.remove('active');
                    document.getElementById(`panel-${idx}`).classList.remove('active');
                }
            });

            // 2. Mută opțiunea focalizată (Săgeată Sus / Jos)
            const currentPanel = document.getElementById(`panel-${tabIdx}`);
            const options = Array.from(currentPanel.querySelectorAll('.menu-option'));

            options.forEach((opt, idx) => {
                if (idx === optionIdx) {
                    opt.classList.add('focused');
                } else {
                    opt.classList.remove('focused');
                }
            });
        };
    </script>
</body>
</html>
