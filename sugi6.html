<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reason Menu Custom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: transparent !important; 
            display: flex;
            justify-content: flex-start; 
            align-items: flex-start;     
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 30px;               
            position: relative;
        }

        .menu-box {
            width: 420px;
            background: rgba(13, 14, 18, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 50px rgba(78, 5, 160, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            
            animation: machoOpenAnimation 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transition: opacity 0.2s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes machoOpenAnimation {
            from { opacity: 0; transform: translateY(-20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .menu-box.menu-hidden {
            opacity: 0 !important;
            transform: translateY(20px) scale(0.96) !important;
            pointer-events: none !important;
        }

        .menu-banner {
            width: 100%;
            height: 110px;
            background-image: url('https://i.ytimg.com/vi/GokDEuoHwoo/sddefault.jpg'); 
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .categories-bar {
            display: flex;
            background: rgba(20, 21, 26, 0.98);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0;
            position: relative;
        }

        .category-tab {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.25s ease;
            position: relative;
        }

        .category-tab.active {
            color: #ffffff; 
            background: rgba(78, 5, 160, 0.06);
            box-shadow: none; 
        }
        
        .category-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: #7289da;
            transition: width 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateX(-50%);
            box-shadow: 0 0 10px #7289da;
        }
        
        .category-tab.active::after { width: 80%; }

        .menu-content {
            padding: 22px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 340px; 
            overflow: hidden;
            background: rgba(13, 14, 18, 0.5);
        }

        .tab-panel { display: none; flex-direction: column; gap: 8px; }
        .tab-panel.active { display: flex; }

        .menu-option {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px; 
            padding: 16px 20px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.35; 
            transition: all 0.1s linear; 
            position: relative;
        }

        .menu-option.focused {
            opacity: 1; 
            color: #ffffff;
            background: rgba(78, 5, 160, 0.15);
            border-color: rgba(114, 137, 218, 0.5); 
            font-weight: 600;
            box-shadow: 0 0 25px rgba(78, 5, 160, 0.3);
            transform: scale(1.015);
        }

        .menu-option .status-tag {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-option.focused .status-tag {
            color: #7289da; 
            text-shadow: 0 0 8px rgba(114, 137, 218, 0.6);
        }

        /* =========================================================================
           [TUNNING: CUSTOM COLOR 78, 5, 160 FOR NOTIFICATIONS]
           ========================================================================= */
        #notification-container {
            position: fixed;
            top: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 99999;
            pointer-events: none;
            width: 280px; 
        }

        .macho-notify {
            width: 100%;
            background: rgba(10, 10, 13, 0.94); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px; 
            
            --notify-color: rgb(78, 5, 160); /* Salvăm culoarea cerută ca variabilă */
            
            /* MODIFICARE: Culoarea exactă cerută de tine pentru margine și glow */
            border: 1px solid var(--notify-color); 
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6), 
                        0 0 18px rgba(78, 5, 160, 0.45), 
                        inset 0 0 10px rgba(78, 5, 160, 0.15); 
                        
            padding: 12px 16px; 
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: auto;
            position: relative;
            overflow: hidden;

            animation: notifySlideIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transition: all 0.3s ease;
        }

        .macho-notify.notify-fade-out {
            animation: notifySlideOut 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes notifySlideIn {
            from { opacity: 0; transform: translateX(40px) scale(0.95); filter: blur(3px); }
            to { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
        }

        @keyframes notifySlideOut {
            from { opacity: 1; transform: translateX(0) scale(1); }
            to { opacity: 0; transform: translateX(60px) scale(0.95); filter: blur(3px); }
        }

        .macho-notify-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Titlul asortat cu noul violet primit de la tine */
        .macho-notify-title {
            font-size: 10px; 
            font-weight: 700;
            color: #8a1be6; /* Nuanță deschisă asortată pentru text clar */
            text-transform: uppercase;
            letter-spacing: 1.2px;
            filter: drop-shadow(0 0 5px rgba(78, 5, 160, 0.8));
        }

        .macho-notify-time {
            font-size: 8px; 
            font-weight: 500;
            color: rgba(255, 255, 255, 0.2.5);
            letter-spacing: 0.5px;
        }

        .macho-notify-body {
            font-size: 12px; 
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
        }

        /* Bara de progres folosește acum culoarea ta pentru bază */
        .macho-notify-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, rgb(78, 5, 160), #a348ff);
            box-shadow: 0 0 8px rgb(78, 5, 160);
            width: 100%;
            animation: notifyProgressTimer 4s linear forwards;
        }

        @keyframes notifyProgressTimer {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="macho-main-box" class="menu-box">
        <div class="menu-banner"></div>

        <div class="categories-bar">
            <div class="category-tab active">Self</div>
            <div class="category-tab">Weapons</div>
            <div class="category-tab">Visuals</div>
        </div>

        <div class="menu-content">
            <div id="panel-0" class="tab-panel active">
                <div class="menu-option focused"><span>Activare Godmode</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Reface Viață & Armură</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Teleport la Waypoint</span><span class="status-tag">[ENTER]</span></div>
            </div>

            <div id="panel-1" class="tab-panel">
                <div class="menu-option"><span>Oferă toate armele</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Muniție Infinită</span><span class="status-tag">[ENTER]</span></div>
            </div>

            <div id="panel-2" class="tab-panel">
                <div class="menu-option"><span>Pornește Wallhack (ESP)</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Bypass Screenshot</span><span class="status-tag">[ENTER]</span></div>
            </div>
        </div>
    </div>

    <script>
        const categories = Array.from(document.querySelectorAll('.category-tab'));
        const menuBox = document.getElementById('macho-main-box');
        const notifyContainer = document.getElementById('notification-container');

        let bOpen = true, bTab = 0, bOpt = 0;
        const bLimits = { [0]: 2, [1]: 1, [2]: 1 };

        window.updateSelection = function(tabIdx, optionIdx) {
            bTab = tabIdx; bOpt = optionIdx;

            categories.forEach((cat, idx) => {
                if (idx === tabIdx) {
                    cat.classList.add('active');
                    document.getElementById(`panel-${idx}`).classList.add('active');
                } else {
                    cat.classList.remove('active');
                    document.getElementById(`panel-${idx}`).classList.remove('active');
                }
            });

            const currentPanel = document.getElementById(`panel-${tabIdx}`);
            const options = Array.from(currentPanel.querySelectorAll('.menu-option'));

            options.forEach((opt, idx) => {
                if (idx === optionIdx) {
                    opt.classList.add('focused');
                } else {
                    opt.classList.remove('focused');
                }
            });
        };

        window.setMenuState = function(visible) {
            if (visible) {
                menuBox.classList.remove('menu-hidden');
            } else {
                menuBox.classList.add('menu-hidden');
            }
        };

        window.createMachoNotification = function(title, message) {
            const notifyBox = document.createElement('div');
            notifyBox.className = 'macho-notify';

            const acum = new Date();
            const timpText = `${acum.getHours().toString().padStart(2, '0')}:${acum.getMinutes().toString().padStart(2, '0')}`;

            notifyBox.innerHTML = `
                <div class="macho-notify-header">
                    <span class="macho-notify-title">${title}</span>
                    <span class="macho-notify-time">${timpText}</span>
                </div>
                <div class="macho-notify-body">${message}</div>
                <div class="macho-notify-progress"></div>
            `;

            notifyContainer.appendChild(notifyBox);

            setTimeout(() => {
                notifyBox.classList.add('notify-fade-out');
            }, 3700);

            setTimeout(() => {
                notifyBox.remove();
            }, 4000);
        };

        window.addEventListener('keydown', function(e) {
            if (e.key === "Insert") {
                bOpen = !bOpen;
                window.setMenuState(bOpen);
                return;
            }

            if (!bOpen) return;

            if (e.key === "q" || e.key === "Q") {
                if (bTab > 0) { bTab--; bOpt = 0; window.updateSelection(bTab, bOpt); }
            }
            else if (e.key === "e" || e.key === "E") {
                if (bTab < 2) { bTab++; bOpt = 0; window.updateSelection(bTab, bOpt); }
            }
            else if (e.key === "ArrowUp") {
                if (bOpt > 0) { bOpt--; window.updateSelection(bTab, bOpt); }
            }
            else if (e.key === "ArrowDown") {
                if (bOpt < bLimits[bTab]) { bOpt++; window.updateSelection(bTab, bOpt); }
            }
            else if (e.key === "Enter") {
                const activePanel = document.getElementById(`panel-${bTab}`);
                const optionText = activePanel.querySelectorAll('.menu-option')[bOpt].querySelector('span').innerText;
                
                console.log(`[TEST BROWSER] Executat: ${optionText}`);
                
                const categoriiNume = { 0: "SELF", 1: "WEAPONS", 2: "VISUALS" };
                window.createMachoNotification(categoriiNume[bTab], `Funcția "${optionText}" a fost activată cu succes!`);
            }
        });
    </script>
</body>
</html>
