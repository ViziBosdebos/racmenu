<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reason Menu Custom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: transparent !important; 
            display: flex;
            justify-content: flex-start; 
            align-items: flex-start;     
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 30px;               
        }

        .menu-box {
            width: 420px;
            background: rgba(13, 14, 18, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 50px rgba(78, 5, 160, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;

            /* FIX: Meniul pornește vizibil nativ ca să nu mai rămână blocat pe ecran */
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            
            /* [ANIMATION] Animație automată de drop-down și fade-in la încărcare */
            animation: machoOpenAnimation 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            
            /* Tranziție rapidă dedicată exclusiv pentru închiderea/deschiderea din Lua */
            transition: opacity 0.2s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* [ANIMATION KEYFRAMES] Efectul de deschidere automat la pornire */
        @keyframes machoOpenAnimation {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Clasa aplicată din Lua/Browser când vrei să ascunzi meniul cu animație */
        .menu-box.menu-hidden {
            opacity: 0 !important;
            transform: translateY(20px) scale(0.96) !important;
            pointer-events: none !important;
        }

        .menu-banner {
            width: 100%;
            height: 110px;
            background-image: url('https://i.ytimg.com/vi/GokDEuoHwoo/sddefault.jpg'); 
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .categories-bar {
            display: flex;
            background: rgba(20, 21, 26, 0.98);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0;
            position: relative;
        }

        .category-tab {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.25s ease;
            position: relative;
        }

        .category-tab.active {
            color: #ffffff; 
            background: rgba(78, 5, 160, 0.06);
            box-shadow: none; 
        }
        
        /* Linie neon sub tabul activ */
        .category-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: #7289da;
            transition: width 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateX(-50%);
            box-shadow: 0 0 10px #7289da;
        }
        
        .category-tab.active::after {
            width: 80%; 
        }

        .menu-content {
            padding: 22px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 340px; 
            overflow: hidden;
            background: rgba(13, 14, 18, 0.5);
        }

        .tab-panel {
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .tab-panel.active {
            display: flex;
        }

        .menu-option {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px; 
            padding: 16px 20px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.35; 
            transition: all 0.1s linear; 
            position: relative;
        }

        /* Stilul modern cu glow violet la selectare */
        .menu-option.focused {
            opacity: 1; 
            color: #ffffff;
            background: rgba(78, 5, 160, 0.15);
            border-color: rgba(114, 137, 218, 0.5); 
            font-weight: 600;
            box-shadow: 0 0 25px rgba(78, 5, 160, 0.3);
            transform: scale(1.015);
        }

        .menu-option .status-tag {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-option.focused .status-tag {
            color: #7289da; 
            text-shadow: 0 0 8px rgba(114, 137, 218, 0.6);
        }
    </style>
</head>
<body>

    <div id="macho-main-box" class="menu-box">
        <div class="menu-banner"></div>

        <div class="categories-bar">
            <div class="category-tab active">Self</div>
            <div class="category-tab">Weapons</div>
            <div class="category-tab">Visuals</div>
        </div>

        <div class="menu-content">
            <div id="panel-0" class="tab-panel active">
                <div class="menu-option focused"><span>Activare Godmode</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Reface Viață & Armură</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Teleport la Waypoint</span><span class="status-tag">[ENTER]</span></div>
            </div>

            <div id="panel-1" class="tab-panel">
                <div class="menu-option"><span>Oferă toate armele</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Muniție Infinită</span><span class="status-tag">[ENTER]</span></div>
            </div>

            <div id="panel-2" class="tab-panel">
                <div class="menu-option"><span>Pornește Wallhack (ESP)</span><span class="status-tag">[ENTER]</span></div>
                <div class="menu-option"><span>Bypass Screenshot</span><span class="status-tag">[ENTER]</span></div>
            </div>
        </div>
    </div>

    <script>
        const categories = Array.from(document.querySelectorAll('.category-tab'));
        const menuBox = document.getElementById('macho-main-box');

        // Variabile interne folosite doar când testezi în Google Chrome
        let bOpen = true, bTab = 0, bOpt = 0;
        const bLimits = { [0]: 2, [1]: 1, [2]: 1 };

        // [LOGIC UNTOUCHED] Funcția apelată din Lua prin MachoExecuteDuiScript
        window.updateSelection = function(tabIdx, optionIdx) {
            bTab = tabIdx; bOpt = optionIdx;

            // 1. Mută tab-ul activ (Q / E)
            categories.forEach((cat, idx) => {
                if (idx === tabIdx) {
                    cat.classList.add('active');
                    document.getElementById(`panel-${idx}`).classList.add('active');
                } else {
                    cat.classList.remove('active');
                    document.getElementById(`panel-${idx}`).classList.remove('active');
                }
            });

            // 2. Mută opțiunea focalizată (Săgeată Sus / Jos)
            const currentPanel = document.getElementById(`panel-${tabIdx}`);
            const options = Array.from(currentPanel.querySelectorAll('.menu-option'));

            options.forEach((opt, idx) => {
                if (idx === optionIdx) {
                    opt.classList.add('focused');
                } else {
                    opt.classList.remove('focused');
                }
            });
        };

        // Modificăm clasa de animație invers, bazată pe ascundere, ca să ruleze curat din Lua
        window.setMenuState = function(visible) {
            if (visible) {
                menuBox.classList.remove('menu-hidden');
            } else {
                menuBox.classList.add('menu-hidden');
            }
        };

        // NAVIGARE DE TEST ÎN BROWSER (Apeși tastele direct când deschizi fișierul în Chrome)
        window.addEventListener('keydown', function(e) {
            // Tasta INSERT -> Închide/Deschide meniul pe ecran pe browser
            if (e.key === "Insert") {
                bOpen = !bOpen;
                window.setMenuState(bOpen);
                return;
            }

            if (!bOpen) return;

            if (e.key === "q" || e.key === "Q") {
                if (bTab > 0) { bTab--; bOpt = 0; window.updateSelection(bTab, bOpt); }
            }
            else if (e.key === "e" || e.key === "E") {
                if (bTab < 2) { bTab++; bOpt = 0; window.updateSelection(bTab, bOpt); }
            }
            else if (e.key === "ArrowUp") {
                if (bOpt > 0) { bOpt--; window.updateSelection(bTab, bOpt); }
            }
            else if (e.key === "ArrowDown") {
                if (bOpt < bLimits[bTab]) { bOpt++; window.updateSelection(bTab, bOpt); }
            }
            else if (e.key === "Enter") {
                const activePanel = document.getElementById(`panel-${bTab}`);
                const optionText = activePanel.querySelectorAll('.menu-option')[bOpt].querySelector('span').innerText;
                console.log(`[TEST BROWSER] Executat: ${optionText}`);
            }
        });
    </script>
</body>
</html>
